name: Deploy Fulltime to Devnet

# Manual trigger only. The deployer wallet is pre-funded via the web faucet and
# provided as a repo secret, so we don't depend on CI-side airdrops (which
# GitHub runner IPs are usually rate-limited out of).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          # Match Solana 1.18.26 platform-tools cargo (writes lockfile v3).
          # Ambient stable (1.97) would regenerate a v4 lock the SBF cargo
          # can't parse.
          toolchain: "1.75.0"

      - name: Install Solana CLI (Anza v1.18.26)
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v1.18.26/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"

      - name: Load deployer + program keypairs
        run: |
          mkdir -p ~/.config/solana target/deploy
          printf '%s' '${{ secrets.DEPLOYER_KEYPAIR }}' > ~/.config/solana/id.json
          printf '%s' '${{ secrets.PROGRAM_KEYPAIR }}'  > target/deploy/fulltime-keypair.json
          solana config set --keypair ~/.config/solana/id.json --url https://api.devnet.solana.com
          echo "Deployer: $(solana address)"
          echo "Program : $(solana address -k target/deploy/fulltime-keypair.json)"

      - name: Best-effort airdrop (may be rate-limited — not relied upon)
        continue-on-error: true
        run: |
          for i in 1 2 3; do solana airdrop 2 && break || sleep 15; done

      - name: Require funding
        run: |
          BAL=$(solana balance | awk '{print $1}')
          echo "Deployer balance: $BAL SOL"
          awk "BEGIN{exit !($BAL >= 2.5)}" || {
            echo "::error::Deployer under-funded ($BAL SOL). Fund $(solana address) at https://faucet.solana.com (devnet) and re-run."
            exit 1
          }

      - name: Build program (SBF)
        # Same SBF compile anchor build runs, minus the IDL/overflow pre-checks
        # and the slow anchor-cli install. Produces target/deploy/fulltime.so.
        run: cargo build-sbf

      - name: Extend program account (upgrades that grew the binary; no-op on first deploy)
        continue-on-error: true
        run: |
          solana program extend 37GjugP2yXMbuGNZTu6XSf1wsbegyXfMXGvGVKpX9vTW 131072 \
            --url https://api.devnet.solana.com

      - name: Deploy to devnet
        run: |
          solana program deploy target/deploy/fulltime.so \
            --program-id target/deploy/fulltime-keypair.json \
            --keypair ~/.config/solana/id.json \
            --url https://api.devnet.solana.com

      - name: Verify on-chain
        run: |
          PROGRAM=37GjugP2yXMbuGNZTu6XSf1wsbegyXfMXGvGVKpX9vTW
          solana program show "$PROGRAM" --url https://api.devnet.solana.com
          echo "✅ Deployed: https://explorer.solana.com/address/$PROGRAM?cluster=devnet"
